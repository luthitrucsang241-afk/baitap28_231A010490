<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 28 - Javascript 05</title>
</head>
<body>

    <h2>Tính tổng các số chia hết cho 3</h2>

    <form onsubmit="handleSubmit(event)">

        <label>Số đầu:</label><br>
        <input type="number" id="start" required><br><br>

        <label>Số cuối:</label><br>
        <input type="number" id="end" required><br><br>

        <button type="submit">Tính tổng</button>

    </form>

    <h3 id="result"></h3>

    <script>

        function handleSubmit(event)
        {

            event.preventDefault();

            const start = parseInt(document.getElementById("start").value);
            const end = parseInt(document.getElementById("end").value);

            let tong = 0;

            for(let i = start; i <= end; i++)
            {
                if(i % 3 == 0)
                {
                    tong += i;
                }
            }

            document.getElementById("result").innerHTML =
                "Tổng các số chia hết cho 3 từ " + start + " đến " + end + " là: " + tong;

        }

    </script>

</body>
</html>
